[custom.jj]
command = '''
jj log -r@ --limit 1 --no-graph --color always -T '
  separate(" ",
    if(conflict, label("conflict", "Ôèù")),
    coalesce(
      if(hidden, label("hidden", change_id.shortest(4) ++ " hidden")),
      if(divergent, label("divergent", change_id.shortest(4) ++ "??")),
      change_id.shortest(4),
    ) ++ if(diff.files().len() > 0, "┬º" ++ diff.files().len() ++ "m┬º"),
    bookmarks.map(|x| if(
        x.name().substr(0, 10).starts_with(x.name()),
        x.name().substr(0, 10),
        x.name().substr(0, 9) ++ "ÔÇª")
      ).join(" "),
    if(description,
      label("working_copy",
        surround("\"","\"",
          if(
             description.first_line().substr(0, 24).starts_with(description.first_line()),
             description.first_line().substr(0, 24),
             description.first_line().substr(0, 23) ++ "ÔÇª"
          )
        )
      )
    ),
  )
' | perl -pe 's/┬º(\d+)m┬º/\e[1;36m(${1}m)\e[0m/'
'''
when = "jj root --ignore-working-copy"
detect_folders = [".jj"]
symbol = "jj:"
format = "[Ôö¿](bold yellow)[$symbol$output]($style)[Ôöá](bold yellow)"
